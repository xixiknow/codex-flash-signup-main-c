<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Mongoose 控制台</title>
    <style>
      .boot-shell {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: #f5f3ee;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .boot-card {
        width: min(100%, 400px);
        border: 1px solid #e8e4dc;
        border-radius: 16px;
        background: #ffffff;
        padding: 28px;
        text-align: center;
      }

      .boot-card h1 {
        margin: 0 0 10px;
        font-size: 22px;
        line-height: 1.2;
        color: #1a1915;
      }

      .boot-card p {
        margin: 0;
        color: #8c857c;
        font-size: 14px;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <main class="boot-shell">
        <section class="boot-card">
          <h1>Mongoose</h1>
          <p>正在加载...</p>
        </section>
      </main>
    </div>
    <script type="module" src="/src/main.ts"></script>
    <script>
      (function () {
        var mounted = false;
        var observer = new MutationObserver(function () {
          if (document.querySelector('.shell') || document.querySelector('.login-shell')) {
            mounted = true;
            observer.disconnect();
          }
        });
        observer.observe(document.getElementById('app'), { childList: true, subtree: true });
        setTimeout(function () {
          if (!mounted) {
            observer.disconnect();
            var reloaded = sessionStorage.getItem('_mg_reload');
            if (!reloaded) {
              sessionStorage.setItem('_mg_reload', '1');
              location.reload();
            } else {
              sessionStorage.removeItem('_mg_reload');
              var p = document.querySelector('.boot-card p');
              if (p) p.textContent = '加载失败，请清除浏览器缓存后重试 (Ctrl+Shift+R)';
            }
          }
        }, 3000);
        window.addEventListener('load', function () {
          sessionStorage.removeItem('_mg_reload');
        });
      })();
    </script>
  </body>
</html>
